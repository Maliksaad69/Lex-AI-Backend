name: FastAPI CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  formatting:
    name: Code Formatting
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - run: |
          python -m pip install --upgrade pip
          pip install black

      - run: black --check .



  type_check:
    name: Type Checking
    needs: lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install mypy

      - run: mypy .

  security:
    name: Security Scan
    needs: type_check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - run: |
          python -m pip install --upgrade pip
          pip install bandit

      - run: bandit -r .

  tests:
    name: Unit Tests
    needs: security
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - run: pytest --cov=. --cov-report=term